###############################################################################
# Elite.Pay – Nginx configuration
# Serves the React/Vite SPA and proxies /api/* → elite-pay-backend service
###############################################################################

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/x-font-ttf font/opentype;
    gzip_vary on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   nosniff;
    add_header X-Frame-Options          DENY;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy          strict-origin-when-cross-origin;

    # ── Proxy /api → backend Kubernetes service ───────────────────────────────
    # The backend Service is named "elite-pay-backend" on port 3000.
    # Kubernetes DNS resolves it as:
    #   elite-pay-backend.elite-pay.svc.cluster.local
    location /api/ {
        proxy_pass         http://elite-pay-backend.elite-pay.svc.cluster.local:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Health check bypass (used by k8s readiness probe) ─────────────────────
    location /health {
        proxy_pass http://elite-pay-backend.elite-pay.svc.cluster.local:3000/health;
        proxy_http_version 1.1;
    }

    # ── Static assets – long-lived cache ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback – all other paths → index.html ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
