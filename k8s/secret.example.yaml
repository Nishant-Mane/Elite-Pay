##############################################################################
# k8s/secret.example.yaml
#
# This file is the TEMPLATE — safe to commit to Git.
# It shows all required keys with placeholder values.
#
# To use:
#   1. Copy this file:   cp k8s/secret.example.yaml k8s/secret.yaml
#   2. Replace every placeholder with a real base64-encoded value:
#      echo -n 'your-real-value' | base64
#   3. Apply:            kubectl apply -f k8s/secret.yaml
#   4. Never commit secret.yaml — it is in .gitignore
##############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: elite-pay-secret
  namespace: elite-pay
type: Opaque
data:
  PORT: MzAwMA==                          # 3000
  MONGO_URI: <base64-encoded-mongo-uri>
  DEVICE_SECRET: <base64-encoded-value>
  RAZORPAY_KEY_ID: <base64-encoded-value>
  RAZORPAY_KEY_SECRET: <base64-encoded-value>
  SUPABASE_JWT_SECRET: <base64-encoded-value>
  RPC_URL: <base64-encoded-value>
  DEPLOYER_PRIVATE_KEY: <base64-encoded-value>
  CONTRACT_ADDRESS: <base64-encoded-value>
  ADMIN_SECRET: <base64-encoded-value>
